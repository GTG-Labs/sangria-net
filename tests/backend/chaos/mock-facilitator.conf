events {
    worker_connections 1024;
}

http {
    init_by_lua_block {
        math.randomseed(os.time() * 1000 + (ngx.worker and ngx.worker.pid() or 0))
    }

    upstream facilitator {
        server 127.0.0.1:3000;
    }

    server {
        listen 80;

        # Simulate slow responses randomly
        location /slow {
            content_by_lua_block {
                local delay = math.random(1, 10)
                ngx.sleep(delay)
                ngx.say('{"slow": true, "delay": ' .. delay .. '}')
            }
        }

        # Simulate failures randomly
        location /v1/generate-payment {
            content_by_lua_block {
                if math.random() < 0.1 then  -- 10% failure rate
                    ngx.status = 500
                    ngx.say('{"error": "Internal facilitator error"}')
                    return
                elseif math.random() < 0.2 then  -- 20% slow response
                    ngx.sleep(5)
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say([[{
                    "challenge": "mock_challenge_]] .. os.time() .. [[",
                    "amount": 10000,
                    "expires_in": 3600,
                    "payment_url": "https://wallet.example.com/pay/mock"
                }]])
            }
        }

        location /v1/settle-payment {
            content_by_lua_block {
                if math.random() < 0.15 then  -- 15% failure rate
                    ngx.status = 400
                    ngx.say('{"success": false, "error_message": "Invalid signature"}')
                    return
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say([[{
                    "success": true,
                    "transaction": "tx_]] .. os.time() .. [["
                }]])
            }
        }

        # Health check
        location /health {
            return 200 '{"status": "ok"}';
        }
    }
}