name: Publish TypeScript SDK

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Dry run — no publish, no commit'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      test_mode:
        description: 'Dry run — no publish, no commit'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: sdk/sdk-typescript/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: sdk/sdk-typescript
        run: pnpm install

      - name: Get version from SDK_VERSIONS.md
        id: version
        working-directory: sdk/sdk-typescript
        run: |
          # Extract TypeScript SDK section from deployment/SDK_VERSIONS.md in a section-aware way
          VERSION=$(awk '
            /^## TypeScript SDK/ { in_section=1; next }
            /^##/ && in_section { exit }
            in_section && /^VERSION:/ {
              gsub(/^VERSION:[ \t]*/, "");
              print;
              exit
            }
          ' ../../deployment/SDK_VERSIONS.md)

          echo "📖 Version from SDK_VERSIONS.md: $VERSION"

          # Validate VERSION is non-empty
          if [ -z "$VERSION" ]; then
            echo "❌ ERROR: Failed to extract VERSION from ../../deployment/SDK_VERSIONS.md"
            echo "Expected: '## TypeScript SDK' section with 'VERSION: X.Y.Z' line"
            echo "Current SDK_VERSIONS.md content:"
            cat ../../deployment/SDK_VERSIONS.md
            exit 1
          fi

          # Validate VERSION matches semver pattern (major.minor.patch with optional prerelease/build)
          if ! echo "$VERSION" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "❌ ERROR: VERSION '$VERSION' does not match semver pattern (major.minor.patch)"
            echo "Expected format: X.Y.Z or X.Y.Z-prerelease or X.Y.Z+build"
            exit 1
          fi

          echo "✅ Validated VERSION: $VERSION"

          # Update package.json to match
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing @sangria-sdk/core@$VERSION"

      - name: Build
        working-directory: sdk/sdk-typescript
        run: pnpm build

      - name: Publish (dry run)
        if: ${{ inputs.test_mode }}
        working-directory: sdk/sdk-typescript
        run: pnpm publish --dry-run --no-git-checks

      - name: Publish to npm
        if: ${{ !inputs.test_mode }}
        working-directory: sdk/sdk-typescript
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        if: ${{ !inputs.test_mode }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add sdk/sdk-typescript/package.json
          git commit -m "chore: release @sangria-sdk/core@${{ steps.version.outputs.version }}"
          git tag "ts-sdk@${{ steps.version.outputs.version }}"
          git push && git push --tags
