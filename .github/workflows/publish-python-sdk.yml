name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Dry run — no publish, no commit'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      test_mode:
        description: 'Dry run — no publish, no commit'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Install package dependencies
        working-directory: sdk/python
        run: pip install -e .

      - name: Get version from SDK_VERSIONS.md
        id: version
        working-directory: sdk/python
        run: |
          # Extract version from deployment/SDK_VERSIONS.md
          VERSION=$(grep -A 2 "## Python SDK" ../../deployment/SDK_VERSIONS.md | grep "VERSION:" | sed 's/VERSION: //')
          echo "📖 Version from SDK_VERSIONS.md: $VERSION"

          # Extract current version from pyproject.toml
          CURRENT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          # Update pyproject.toml to match
          sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$VERSION\"/" pyproject.toml

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing sangria-core@$VERSION"

      - name: Build package
        working-directory: sdk/python
        run: python -m build

      - name: Publish (dry run)
        if: ${{ inputs.test_mode }}
        working-directory: sdk/python
        run: |
          echo "Dry run - would publish:"
          ls -la dist/

      - name: Publish to PyPI
        if: ${{ !inputs.test_mode }}
        working-directory: sdk/python
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Commit version bump
        if: ${{ !inputs.test_mode }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add sdk/python/pyproject.toml
          git commit -m "chore: release sangria-core@${{ steps.version.outputs.version }}"
          git tag "py-sdk@${{ steps.version.outputs.version }}"
          git push && git push --tags