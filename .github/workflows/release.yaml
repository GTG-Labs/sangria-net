name: Release SDKs

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.1) — leave empty to auto-increment'
        required: false
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      test_mode:
        description: 'Test mode — npm dry-run, Python publishes to TestPyPI, skips GitHub release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Update versions
  update-versions:
    name: Update Package Versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.push.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Auto-increment based on release type
            CURRENT_VERSION=$(node -p "require('./sdk/sdk-typescript/package.json').version")
            case "${{ inputs.release_type }}" in
              major) VERSION=$(echo $CURRENT_VERSION | awk -F. '{$1 = $1 + 1; $2 = 0; $3 = 0;} 1' OFS=.) ;;
              minor) VERSION=$(echo $CURRENT_VERSION | awk -F. '{$2 = $2 + 1; $3 = 0;} 1' OFS=.) ;;
              patch) VERSION=$(echo $CURRENT_VERSION | awk -F. '{$3 = $3 + 1;} 1' OFS=.) ;;
            esac
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Update TypeScript package version
        run: |
          cd sdk/sdk-typescript
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Update Python package version
        run: |
          cd sdk/python
          sed -i 's/version = "[^"]*"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml

      - name: Commit version updates
        id: push
        if: ${{ !inputs.test_mode }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sdk/sdk-typescript/package.json sdk/python/pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # Run full test suite before release
  test-before-release:
    name: Test Before Release
    needs: [update-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-versions.outputs.commit_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        working-directory: tests
        run: pnpm install

      - name: Setup Python SDK environment
        working-directory: sdk/python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[fastapi]"

      - name: Run all tests
        working-directory: tests
        run: pnpm test:all

  # Build and publish TypeScript SDK
  deploy-typescript:
    name: Deploy TypeScript SDK
    runs-on: ubuntu-latest
    needs: [update-versions, test-before-release]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-versions.outputs.commit_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: sdk/sdk-typescript/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: sdk/sdk-typescript
        run: pnpm install

      - name: Build package
        working-directory: sdk/sdk-typescript
        run: pnpm build

      - name: Publish to npm (dry run)
        if: ${{ inputs.test_mode }}
        working-directory: sdk/sdk-typescript
        run: pnpm publish --dry-run

      - name: Publish to npm
        if: ${{ !inputs.test_mode }}
        working-directory: sdk/sdk-typescript
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build and publish Python SDK
  deploy-python:
    name: Deploy Python SDK
    runs-on: ubuntu-latest
    needs: [update-versions, test-before-release]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-versions.outputs.commit_sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: sdk/python
        run: python -m build

      - name: Check package
        working-directory: sdk/python
        run: python -m twine check dist/*

      - name: Publish to PyPI (dry run)
        if: ${{ inputs.test_mode }}
        working-directory: sdk/python
        run: python -m twine upload --repository testpypi dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}

      - name: Publish to PyPI
        if: ${{ !inputs.test_mode }}
        working-directory: sdk/python
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # Create GitHub release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [update-versions, deploy-typescript, deploy-python]
    if: ${{ !inputs.test_mode }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-versions.outputs.commit_sha || github.sha }}

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.update-versions.outputs.version }}
          release_name: Release v${{ needs.update-versions.outputs.version }}
          body: |
            ## Release v${{ needs.update-versions.outputs.version }}

            ### Packages Published

            **TypeScript SDK** - `@sangria/core@${{ needs.update-versions.outputs.version }}`
            ```bash
            npm install @sangria/core@${{ needs.update-versions.outputs.version }}
            ```

            **Python SDK** - `sangria-core@${{ needs.update-versions.outputs.version }}`
            ```bash
            pip install sangria-core==${{ needs.update-versions.outputs.version }}
            ```

            ### Framework Support

            **TypeScript SDK:**
            - Express.js middleware
            - Fastify plugin
            - Hono middleware

            **Python SDK:**
            - FastAPI decorator
            - Core HTTP client

            ### Documentation

            See [README](https://github.com/GTG-Labs/sangria#readme) for usage examples and integration guides.

            **Full Changelog**: https://github.com/GTG-Labs/sangria/commits/v${{ needs.update-versions.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.update-versions.outputs.version, '-') }}

  # Slack notification (optional)
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [update-versions, create-release]
    if: always() && !inputs.test_mode
    steps:
      - name: Release status
        run: |
          if [ "${{ needs.create-release.result }}" == "success" ]; then
            echo "Release v${{ needs.update-versions.outputs.version }} completed successfully!"
            echo "TypeScript SDK: @sangria/core@${{ needs.update-versions.outputs.version }}"
            echo "Python SDK: sangria-core@${{ needs.update-versions.outputs.version }}"
          else
            echo "Release v${{ needs.update-versions.outputs.version }} failed!"
            exit 1
          fi
