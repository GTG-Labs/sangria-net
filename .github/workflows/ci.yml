name: Sangria SDK CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Lint and type check both SDKs
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        working-directory: tests
        run: pnpm install

      - name: Lint TypeScript SDK
        working-directory: tests
        run: pnpm lint:ts

      - name: Setup Python for linting
        working-directory: sdk/python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint Python SDK
        working-directory: sdk/python
        run: |
          source venv/bin/activate
          black --check .
          flake8 .
          mypy src/sangria_sdk/

  # Run TypeScript tests
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tests
        run: pnpm install

      - name: Run TypeScript unit tests
        working-directory: tests
        run: pnpm test:unit:ts

      - name: Run security tests
        working-directory: tests
        run: pnpm test:security


  # Run Python tests
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Python SDK environment
        working-directory: sdk/python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint Python SDK
        working-directory: sdk/python
        run: |
          source venv/bin/activate
          black --check .
          flake8 .
          mypy src/sangria_sdk/

      - name: Run Python unit tests
        working-directory: sdk/python
        run: |
          source venv/bin/activate
          # Run the Python tests that are in the main tests directory
          cd ../../tests
          python -m pytest unit/python/ -v --cov=sangria_sdk --cov-report=xml --cov-report=html --cov-fail-under=90

      - name: Upload Python coverage
        uses: codecov/codecov-action@v3
        with:
          file: tests/coverage.xml
          flags: python
          name: python-coverage

  # Run E2E and integration tests
  test-integration:
    name: Integration Tests (E2E)
    runs-on: ubuntu-latest
    needs: [test-typescript, test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tests
        run: pnpm install

      - name: Run E2E tests
        working-directory: tests
        run: pnpm test:e2e

      - name: Performance tests (placeholder)
        working-directory: tests
        run: echo "Performance tests would be configured here when needed"

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: tests
        run: pnpm install

      - name: Setup Python SDK for security audit
        working-directory: sdk/python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run TypeScript security audit
        working-directory: tests
        run: pnpm security:audit:ts

      - name: Run Python security audit
        working-directory: sdk/python
        run: |
          source venv/bin/activate
          bandit -r src/sangria_sdk/
          safety check --ignore 75180 --ignore 85681 --ignore 79883

  # Coverage and final checks
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-typescript, test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tests
        run: pnpm install

      - name: Generate coverage report
        working-directory: tests
        run: pnpm coverage:check

      - name: Upload TypeScript coverage
        uses: codecov/codecov-action@v3
        with:
          flags: typescript
          name: typescript-coverage

  # Final status check
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, test-typescript, test-python, test-integration, security, coverage]
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "TypeScript Tests: ${{ needs.test-typescript.result }}"
          echo "Python Tests: ${{ needs.test-python.result }}"
          echo "Integration Tests: ${{ needs.test-integration.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test-typescript.result }}" != "success" ]] || \
             [[ "${{ needs.test-python.result }}" != "success" ]] || \
             [[ "${{ needs.test-integration.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "❌ CI FAILED"
            exit 1
          else
            echo "✅ CI PASSED - All tests successful!"
          fi