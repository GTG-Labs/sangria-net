name: Comprehensive SDK Testing

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level to run'
        required: true
        default: 'all'
        type: choice
        options:
          - unit
          - integration
          - e2e
          - all

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  COVERAGE_THRESHOLD_UNIT: 95
  COVERAGE_THRESHOLD_INTEGRATION: 90
  COVERAGE_THRESHOLD_OVERALL: 92

jobs:
  test-matrix:
    name: Test Matrix Setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set test matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.test_level }}" = "unit" ]; then
            echo 'matrix={"test-type":["unit"]}' >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_level }}" = "integration" ]; then
            echo 'matrix={"test-type":["integration"]}' >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_level }}" = "e2e" ]; then
            echo 'matrix={"test-type":["e2e"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"test-type":["unit","integration","e2e"]}' >> $GITHUB_OUTPUT
          fi

  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install TypeScript SDK dependencies
        working-directory: sdk/sdk-typescript
        run: pnpm install

      - name: Install Python SDK dependencies
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint TypeScript SDK
        working-directory: sdk/sdk-typescript
        run: |
          pnpm lint
          npm run type-check

      - name: Lint Python SDK
        working-directory: sdk/python
        run: |
          black --check .
          flake8 .
          mypy sangria_sdk/

      - name: Check for security issues
        working-directory: sdk/python
        run: |
          bandit -r sangria_sdk/
          safety check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [test-matrix]
    if: contains(fromJson(needs.test-matrix.outputs.matrix).test-type, 'unit')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18', '20', '22']
        python-version: ['3.9', '3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: tests
        run: |
          # Install test suite dependencies
          pnpm install

          # TypeScript SDK
          cd ../sdk/sdk-typescript
          pnpm install
          cd ../../tests

          # Python SDK
          cd ../sdk/python
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          cd ../tests

      - name: Run TypeScript unit tests with coverage
        working-directory: sdk/sdk-typescript
        run: |
          pnpm test:unit:coverage
          npm run coverage:report

      - name: Run Python unit tests with coverage
        working-directory: sdk/python
        run: |
          pytest tests/unit/ -v --cov=sangria_sdk --cov-report=xml --cov-report=html --cov-fail-under=${{ env.COVERAGE_THRESHOLD_UNIT }}

      - name: Check TypeScript coverage threshold
        working-directory: sdk/sdk-typescript
        run: |
          pnpm coverage:check -- --threshold=${{ env.COVERAGE_THRESHOLD_UNIT }}

      - name: Upload TypeScript coverage
        uses: codecov/codecov-action@v3
        with:
          file: sdk/sdk-typescript/coverage/lcov.info
          flags: typescript-unit
          name: typescript-unit-${{ matrix.os }}-node${{ matrix.node-version }}

      - name: Upload Python coverage
        uses: codecov/codecov-action@v3
        with:
          file: sdk/python/coverage.xml
          flags: python-unit
          name: python-unit-${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Store test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.os }}-node${{ matrix.node-version }}-py${{ matrix.python-version }}
          path: |
            sdk/sdk-typescript/coverage/
            sdk/python/htmlcov/
            sdk/python/coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-matrix]
    if: contains(fromJson(needs.test-matrix.outputs.matrix).test-type, 'integration')
    strategy:
      matrix:
        framework:
          - express
          - fastify
          - hono
          - fastapi
          - django
          - flask

    # No Docker services needed - tests use MockSangriaServer

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: tests
        run: |
          pnpm install
          cd ../sdk/sdk-typescript && pnpm install && cd ../../tests
          cd ../sdk/python && pip install -e ".[dev]" && cd ../tests

      # No Docker services needed - tests use MockSangriaServer

      - name: Run integration tests - ${{ matrix.framework }}
        working-directory: tests
        run: |
          pnpm test:integration:${{ matrix.framework }}

      - name: Generate integration coverage report
        working-directory: tests
        run: |
          pnpm coverage:integration

      - name: Check integration coverage threshold
        working-directory: tests
        run: |
          pnpm coverage:check:integration -- --threshold=${{ env.COVERAGE_THRESHOLD_INTEGRATION }}

      - name: Upload integration coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage/integration-lcov.info
          flags: integration-${{ matrix.framework }}
          name: integration-${{ matrix.framework }}

      - name: Cleanup
        if: always()
        run: echo "No cleanup needed - MockSangriaServer stops automatically"

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [test-matrix, unit-tests]
    if: contains(fromJson(needs.test-matrix.outputs.matrix).test-type, 'e2e')

    # No Docker services needed - E2E tests use MockSangriaServer

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install dependencies
        working-directory: tests
        run: |
          pnpm install
          cd ../sdk/sdk-typescript && pnpm install && cd ../../tests
          cd ../sdk/python && pip install -e ".[dev]" && cd ../tests

      - name: Build backend
        working-directory: backend
        run: |
          go mod download
          go build -o sangria-backend

      - name: Start full test environment
        run: |
          echo "Using MockSangriaServer - no Docker needed"
          # Wait for all services
          echo "MockSangriaServer starts instantly - no wait needed"

      - name: Run E2E tests
        working-directory: tests
        run: |
          pnpm test:e2e

      - name: Run cross-SDK compatibility tests
        working-directory: tests
        run: |
          pnpm test:cross-sdk

      - name: Run security tests
        working-directory: tests
        run: |
          pnpm test:security

      - name: Run performance tests
        working-directory: tests
        run: |
          pnpm test:performance

      - name: Generate E2E test report
        if: always()
        working-directory: tests
        run: |
          pnpm test:report:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            e2e/results/
            e2e/screenshots/
            e2e/videos/

      - name: Cleanup
        if: always()
        run: echo "No cleanup needed - MockSangriaServer stops automatically"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install TypeScript SDK dependencies
        working-directory: sdk/sdk-typescript
        run: pnpm install

      - name: Audit TypeScript dependencies
        working-directory: sdk/sdk-typescript
        run: |
          pnpm audit --audit-level=moderate
          npx audit-ci --moderate

      - name: Audit Python dependencies
        working-directory: sdk/python
        run: |
          pip install safety
          safety check --json --output safety-report.json

      - name: Run Semgrep security analysis
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/javascript
            p/python

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            sdk/python/safety-report.json
            .semgrep/

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.test_level == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: tests
        run: |
          pnpm install
          cd ../sdk/sdk-typescript && pnpm install && cd ../../tests
          cd ../sdk/python && pip install -e ".[dev]" && cd ../tests

      - name: Start test services
        run: echo "No Docker needed - using MockSangriaServer"

      - name: Run performance benchmarks
        working-directory: tests
        run: |
          pnpm benchmark:all

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmarks
          path: benchmarks/

  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install test dependencies
        working-directory: tests
        run: pnpm install

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4

      - name: Combine coverage reports
        working-directory: tests
        run: |
          pnpm coverage:combine

      - name: Check overall coverage threshold
        working-directory: tests
        run: |
          pnpm coverage:check:overall -- --threshold=${{ env.COVERAGE_THRESHOLD_OVERALL }}

      - name: Upload combined coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage/combined-lcov.info
          flags: combined
          name: combined-coverage

      - name: Generate coverage badge
        working-directory: tests
        run: |
          pnpm coverage:badge

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage/coverage-comment.md

  deployment-readiness:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, integration-tests, e2e-tests, security-audit, coverage-report]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "Lint and TypeCheck: ${{ needs.lint-and-typecheck.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo "Coverage Report: ${{ needs.coverage-report.result }}"

          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]] ||
             [[ "${{ needs.unit-tests.result }}" != "success" ]] ||
             [[ "${{ needs.integration-tests.result }}" != "success" ]] ||
             [[ "${{ needs.e2e-tests.result }}" != "success" ]] ||
             [[ "${{ needs.security-audit.result }}" != "success" ]] ||
             [[ "${{ needs.coverage-report.result }}" != "success" ]]; then
            echo "❌ Deployment readiness check FAILED"
            echo "One or more required checks failed. Not ready for deployment."
            exit 1
          else
            echo "✅ Deployment readiness check PASSED"
            echo "All checks passed. Ready for deployment!"
          fi

      - name: Post success notification
        if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
        run: |
          echo "🚀 All tests passed! SDKs are ready for release."

      - name: Post failure notification
        if: failure()
        run: |
          echo "💥 Tests failed! Review the failures before deployment."