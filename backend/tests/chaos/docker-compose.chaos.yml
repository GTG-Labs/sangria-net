version: '3.8'

services:
  # Main application under test
  sangria-backend:
    build:
      context: ../../
      dockerfile: Dockerfile.test
    environment:
      - DATABASE_URL=postgres://testuser:testpass@postgres:5432/testdb
      - X402_FACILITATOR_URL=http://mock-facilitator:80
      - CDP_API_KEY=test_key
      - CDP_API_SECRET=test_secret
    depends_on:
      postgres:
        condition: service_healthy
      mock-facilitator:
        condition: service_started
    networks:
      - chaos-net

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chaos-net

  # Mock facilitator service
  mock-facilitator:
    image: nginx:alpine
    ports:
      - "9080:80"  # Changed from 8080 to 9080 to avoid conflicts
    volumes:
      - ./mock-facilitator.conf:/etc/nginx/nginx.conf
    networks:
      - chaos-net

  # Toxiproxy for network chaos
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.5.0
    ports:
      - "9474:8474"  # API port (changed from 8474)
      - "5434:5434"  # Proxy for postgres (changed from 5433)
      - "8082:8082"  # Proxy for facilitator (changed from 8081)
    networks:
      - chaos-net

  # Database killer - simulates DB crashes
  db-chaos:
    image: alpine
    command: |
      sh -c '
        while true; do
          sleep $$((RANDOM % 120 + 30))  # Random 30-150 seconds
          echo "Killing database..."
          kill -9 $$(pgrep postgres) 2>/dev/null || true
          sleep 10
        done
      '
    network_mode: "service:postgres"
    depends_on:
      - postgres

  # Network partitioner
  network-chaos:
    image: alpine
    command: |
      sh -c '
        apk add --no-cache iptables
        while true; do
          sleep $$((RANDOM % 180 + 60))  # Random 60-240 seconds
          echo "Creating network partition..."
          iptables -A INPUT -p tcp --dport 5432 -j DROP
          sleep 15
          echo "Healing network partition..."
          iptables -D INPUT -p tcp --dport 5432 -j DROP
        done
      '
    privileged: true
    network_mode: "service:postgres"
    depends_on:
      - postgres

  # Memory pressure simulator
  memory-chaos:
    image: alpine
    command: |
      sh -c '
        while true; do
          sleep $$((RANDOM % 300 + 120))  # Random 2-7 minutes
          echo "Creating memory pressure..."
          dd if=/dev/zero of=/tmp/memload bs=1M count=512 2>/dev/null &
          sleep 30
          echo "Releasing memory pressure..."
          rm -f /tmp/memload
          killall dd 2>/dev/null || true
        done
      '
    networks:
      - chaos-net

  # Load generator
  load-generator:
    image: alpine
    command: |
      sh -c '
        apk add --no-cache curl
        while true; do
          for i in $$(seq 1 100); do
            curl -X POST http://sangria-backend:8000/v1/generate-payment \
              -H "Content-Type: application/json" \
              -d "{\"amount\": 0.01, \"resource\": \"test-$$(date +%s)\", \"description\": \"Load test\"}" \
              &
          done
          wait
          sleep 5
        done
      '
    depends_on:
      - sangria-backend
    networks:
      - chaos-net

networks:
  chaos-net:
    driver: bridge